<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandan's Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f8ff; color: #333; padding-bottom: 50px; text-align: center; }
        
        header { background: linear-gradient(135deg, #1e90ff, #00bfff); color: white; padding: 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .profile-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; object-fit: cover; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; padding: 0 10px; }
        .tab-btn { background: white; border: 2px solid #1e90ff; color: #1e90ff; padding: 10px 15px; font-size: 14px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active, .tab-btn:hover { background: #1e90ff; color: white; }

        .game-window { background: white; max-width: 450px; margin: 0 auto 20px auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; }
        .game-window.active { display: block; }
        .btn { background: #1e90ff; color: white; border: none; padding: 10px 20px; font-size: 14px; border-radius: 5px; cursor: pointer; margin-top: 15px; }

        /* GAME 1: SUDOKU STYLE */
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); max-width: 320px; margin: 15px auto; border: 2px solid #333; }
        .sudoku-grid input { width: 100%; height: 35px; text-align: center; font-size: 16px; border: 1px solid #ccc; outline: none; }

        /* GAME 2: TIC TAC TOE */
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 260px; margin: 15px auto; }
        .ttt-cell { background: #f0f4f8; height: 80px; font-size: 36px; font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; border: 1px solid #d0d7de; }

        /* GAME 3: MEMORY MATCH */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 300px; margin: 15px auto; }
        .memory-card { background: #1e90ff; height: 70px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; color: transparent; user-select: none; }
        .memory-card.flipped { background: #e6f2ff; color: #333; cursor: default; }
    </style>
</head>
<body>

    <header>
        <div class="profile-container">
            <img src="chandan-avatar.png" alt="Chandan" class="avatar">
            <h1>Chandan's Game</h1>
            <p>Choose a game and start playing instantly!</p>
        </div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchGame('sudoku', this)">🧩 Sudoku</button>
        <button class="tab-btn" onclick="switchGame('tictactoe', this)">❌ Tic Tac Toe</button>
        <button class="tab-btn" onclick="switchGame('memory', this)">🃏 Memory Match</button>
    </div>

    <div class="container">
        <div id="sudokuGame" class="game-window active">
            <h2>Sudoku Challenge</h2>
            <div class="sudoku-grid" id="sudokuGrid"></div>
            <button class="btn" onclick="alert('Great job playing Chandan\'s Sudoku!')">Verify Game</button>
        </div>

        <div id="tictactoeGame" class="game-window">
            <h2>Tic Tac Toe (vs AI)</h2>
            <div class="ttt-grid" id="tttGrid"></div>
            <button class="btn" onclick="resetTTT()">Restart Game</button>
        </div>

        <div id="memoryGame" class="game-window">
            <h2>Memory Match</h2>
            <div class="memory-grid" id="memoryGrid"></div>
            <button class="btn" onclick="resetMemory()">Reset Board</button>
        </div>
    </div>

    <script>
        function switchGame(gameId, btn) {
            document.querySelectorAll('.game-window').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(gameId + 'Game').classList.add('active');
            btn.classList.add('active');
        }

        // SUDOKU GENERATION
        const sudokuGrid = document.getElementById('sudokuGrid');
        const board = [5,3,0,0,7,0,0,0,0,6,0,0,1,9,5,0,0,0,0,9,8,0,0,0,0,6,0,8,0,0,0,6,0,0,0,3,4,0,0,8,0,3,0,0,1,7,0,0,0,2,0,0,0,6,0,6,0,0,0,0,2,8,0,0,0,0,4,1,9,0,0,5,0,0,0,0,8,0,0,7,9];
        board.forEach(num => {
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            if(num !== 0) { input.value = num; input.disabled = true; input.style.background = '#e6f2ff'; }
            sudokuGrid.appendChild(input);
        });

        // TIC TAC TOE
        const tttGrid = document.getElementById('tttGrid');
        let tttState = ["", "", "", "", "", "", "", "", ""];
        function createTTT() {
            tttGrid.innerHTML = '';
            tttState.forEach((cell, idx) => {
                const div = document.createElement('div');
                div.className = 'ttt-cell';
                div.innerText = cell;
                div.onclick = () => playerMove(idx);
                tttGrid.appendChild(div);
            });
        }
        function playerMove(idx) {
            if(tttState[idx] === "") {
                tttState[idx] = "X"; createTTT();
                setTimeout(aiMove, 300);
            }
        }
        function aiMove() {
            let emptyIdx = tttState.map((c, i) => c === "" ? i : null).filter(v => v !== null);
            if(emptyIdx.length > 0) {
                let random = emptyIdx[Math.floor(Math.random() * emptyIdx.length)];
                tttState[random] = "O"; createTTT();
            }
        }
        function resetTTT() { tttState = ["", "", "", "", "", "", "", "", ""]; createTTT(); }
        createTTT();

        // MEMORY MATCH
        const memoryGrid = document.getElementById('memoryGrid');
        const icons = ['🍎','🍎','🍌','🍌','🍇','🍇','🍓','🍓','🍒','🍒','🍍','🍍','👑','👑','💎','💎'];
        let shuffled = []; let flippedCards = [];
        function resetMemory() {
            memoryGrid.innerHTML = ''; flippedCards = [];
            shuffled = icons.sort(() => 0.5 - Math.random());
            shuffled.forEach((icon, idx) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.innerText = icon;
                card.onclick = () => flipCard(card);
                memoryGrid.appendChild(card);
            });
        }
        function flipCard(card) {
            if(flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped'); flippedCards.push(card);
                if(flippedCards.length === 2) {
                    if(flippedCards[0].innerText !== flippedCards[1].innerText) {
                        setTimeout(() => { flippedCards.forEach(c => c.classList.remove('flipped')); flippedCards = []; }, 800);
                    } else { flippedCards = []; }
                }
            }
        }
        resetMemory();
    </script>
</body>
</html>
