<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandan's Puzzle World</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f8ff; color: #333; padding-bottom: 50px; }
        
        /* Header Section */
        header { background: linear-gradient(135deg, #1e90ff, #00bfff); color: white; padding: 20px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .profile-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); object-fit: cover; }
        header h1 { font-size: 24px; letter-spacing: 1px; }
        header p { font-size: 14px; opacity: 0.9; }

        /* Main Container */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .section-title { margin: 20px 0 10px 0; color: #1e90ff; font-size: 20px; border-left: 5px solid #1e90ff; padding-left: 10px; }

        /* Featured Live Game (Sudoku) */
        .sudoku-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-bottom: 30px; }
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); max-width: 360px; margin: 15px auto; border: 3px solid #333; }
        .sudoku-grid input { width: 100%; height: 40px; text-align: center; font-size: 18px; font-weight: bold; border: 1px solid #ccc; outline: none; }
        .sudoku-grid input:nth-child(3n) { border-right: 2px solid #333; }
        .sudoku-grid input:nth-child(9n) { border-right: none; }
        header, .sudoku-grid input:nth-parent { border-bottom: 2px solid #333; }
        /* Simple border logic for 9x9 layout blocks */
        .btn { background: #1e90ff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #00bfff; }

        /* 30 Games Grid */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
        .game-card { background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 1px solid #eef2f5; transition: transform 0.2s; cursor: pointer; }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); border-color: #1e90ff; }
        .game-icon { font-size: 35px; margin-bottom: 8px; display: block; }
        .game-card h3 { font-size: 14px; color: #444; }
        .game-status { font-size: 11px; color: #ff9800; background: #fff5e6; padding: 2px 6px; border-radius: 10px; display: inline-block; margin-top: 5px; font-weight: bold; }
        .game-status.active { color: #4caf50; background: #e8f5e9; }
    </style>
</head>
<body>

    <header>
        <div class="profile-container">
            <img src="chandan-avatar.png" alt="Chandan" class="avatar">
            <h1>CHANDAN'S PUZZLE WORLD</h1>
            <p>Welcome to my gaming zone! Explore 30 amazing puzzle games.</p>
        </div>
    </header>

    <div class="container">
        
        <h2 class="section-title">🔥 Featured Game: Sudoku Mania</h2>
        <div class="sudoku-box">
            <p>Fill the grid so that every row, column, and 3x3 box contains the digits 1 to 9.</p>
            <div class="sudoku-grid" id="sudokuGrid">
                </div>
            <button class="btn" onclick="checkSudoku()">Verify Answers</button>
        </div>

        <h2 class="section-title">🎮 All Puzzles (30 Games Collection)</h2>
        <div class="games-grid" id="gamesGrid">
            </div>

    </div>

    <script>
        // 1. Simple Sudoku Generator Logic (Sample Grid)
        const samplePuzzle = [
            5,3,0,0,7,0,0,0,0,
            6,0,0,1,9,5,0,0,0,
            0,9,8,0,0,0,0,6,0,
            8,0,0,0,6,0,0,0,3,
            4,0,0,8,0,3,0,0,1,
            7,0,0,0,2,0,0,0,6,
            0,6,0,0,0,0,2,8,0,
            0,0,0,4,1,9,0,0,5,
            0,0,0,0,8,0,0,7,9
        ];

        const gridEl = document.getElementById('sudokuGrid');
        samplePuzzle.forEach((num) => {
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            if(num !== 0) {
                input.value = num;
                input.disabled = true;
                input.style.background = '#e6f2ff';
            }
            gridEl.appendChild(input);
        });

        function checkSudoku() {
            alert("Great effort! Keep solving Chandan's puzzle!");
        }

        // 2. Generating 30 Puzzle Games list dynamically
        const puzzleGames = [
            { name: "Sudoku Mania", icon: "🧩", active: true },
            { name: "Block Blast", icon: "🟩", active: false },
            { name: "Crossword Challenge", icon: "📝", active: false },
            { name: "Match 3 Gems", icon: "💎", active: false },
            { name: "Logic Grids", icon: "📊", active: false },
            { name: "Memory Match", icon: "🃏", active: false },
            { name: "Hidden Objects", icon: "🔍", active: false },
            { name: "Number Crunch", icon: "🔢", active: false },
            { name: "Pipe Connect", icon: "🚰", active: false },
            { name: "Jigsaw Master", icon: "🖼️", active: false },
            { name: "Word Search", icon: "🔤", active: false },
            { name: "Maze Runner", icon: "🏛️", active: false },
            { name: "2048 Deluxe", icon: "➕", active: false },
            { name: "Chess Puzzles", icon: "♞", active: false },
            { name: "Minesweeper", icon: "💣", active: false },
            { name: "Tic Tac Toe AI", icon: "❌", active: false },
            { name: "Slide Puzzle", icon: "🖼️", active: false },
            { name: "Tower of Hanoi", icon: "🗼", active: false },
            { name: "Hexa Puzzle", icon: "⬡", active: false },
            { name: "Color Fill", icon: "🎨", active: false },
            { name: "Wordle Clone", icon: "🟩", active: false },
            { name: "Bubble Shooter", icon: "🔵", active: false },
            { name: "Tangram Shapes", icon: "📐", active: false },
            { name: "Bridge Builder", icon: "🌉", active: false },
            { name: "Traffic Jam", icon: "🚗", active: false },
            { name: "Water Sort", icon: "🧪", active: false },
            { name: "Link Dot to Dot", icon: "⚪", active: false },
            { name: "Math Riddles", icon: "➗", active: false },
            { name: "Hangman Game", icon: "🪓", active: false },
            { name: "Crypto Codes", icon: "🔐", active: false }
        ];

        const gamesGridEl = document.getElementById('gamesGrid');
        puzzleGames.forEach((game) => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <span class="game-icon">${game.icon}</span>
                <h3>${game.name}</h3>
                <span class="game-status ${game.active ? 'active' : ''}">${game.active ? 'Play Now' : 'Coming Soon'}</span>
            `;
            if(!game.active) {
                card.onclick = () => alert(`${game.name} is coming soon in Chandan's next update!`);
            }
            gamesGridEl.appendChild(card);
        });
    </script>
</body>
</html>
